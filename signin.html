<!doctype html>
<html lang="es" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in – Serpents</title>
   <link rel="icon" href="favicon.ico">
    <link href="style55.css" rel="stylesheet" />
    <script src="signin.js" defer></script>
  </head>
  <body class="auth-body">
    
      <div class="logo-area">
      </div>
    
    <main class="auth-wrapper">
      <div class="welcome-container">
        <h1 class="welcome"><span class="resaltado-title">Welcome</span> Back</h1>
      </div>
      <section class="auth-card" aria-labelledby="signin-title">
        <h1 id="signin-title" class="auth-title">Sign in</h1>
        <p class="auth-subtitle">
          Entra en tu cuenta de <a href="index3.html"><span class="resaltado">Serpents</span></a>
        </p>

        <form class="auth-form">
          <label for="email">Email</label>
          <input
            id="email"
            name="email"
            type="email"
            autocomplete="email"
            required
          />

          <label for="password">Contraseña</label>
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="current-password"
            required
          />

          <button type="submit" class="button-primary auth-button">
            Sign in
          </button>
        </form>

        <p class="auth-footer-text">
          ¿No tienes cuenta todavía?
          <a href="start-project.html" class="auth-link">
            Start your project
          </a>
        </p>
      </section>
    </main>


<footer>
  <div class="termsof">
  <p>

    By continuing, you agree to Serpents's <a href="Terms.html"> Terms of Service </a>and<br>
    Privacy Policy and to receive periodic emails with updtes

  </p>
  </div>
</footer>
  </body>
</html>
