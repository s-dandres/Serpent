<section class="auth-page">
  <div class="logo-area"></div>

  <main class="auth-wrapper">
    <div class="welcome-container">
      <h1 class="welcome"><span class="resaltado-title">Welcome</span> Back</h1>
    </div>

    <section class="auth-card" aria-labelledby="signin-title">
      <h1 id="signin-title" class="auth-title">Sign in</h1>
      <p class="auth-subtitle">
        Entra en tu cuenta de <a href="#/" data-link><span class="resaltado">Serpents</span></a>
      </p>

      <form class="auth-form">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" required />

        <label for="password">Contrasena</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required />

        <button type="submit" class="button-primary auth-button">Sign in</button>
      </form>

      <p class="auth-footer-text">
        No tienes cuenta todavia?
        <a href="#/product" data-link class="auth-link">Start your project</a>
      </p>
    </section>
  </main>

  <footer class="auth-footer">
    By continuing, you agree to Serpents's
    <a href="#/terms" data-link class="resaltado">Terms of Service</a> and Privacy Policy.
  </footer>
</section>
